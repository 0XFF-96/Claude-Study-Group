name: Update progress overview

on:
  schedule:
    - cron: "0 0 * * 1"        # every Monday 00:00 UTC
  push:
    branches: [main]
    paths:
      - "members/**"
      - "scripts/update_progress.py"
  workflow_dispatch:

# Avoid overlapping runs racing to push.
concurrency:
  group: update-progress
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate PROGRESS.md
        run: |
          python scripts/update_progress.py >> "$GITHUB_STEP_SUMMARY"

      - name: Commit if changed
        run: |
          if [[ -z "$(git status --porcelain PROGRESS.md)" ]]; then
            echo "No progress changes."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PROGRESS.md
          git commit -m "chore: auto-update progress overview [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
